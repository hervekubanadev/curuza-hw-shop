version: "3.9"

services:
  app:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: curuza
      POSTGRES_USER: curuza
      POSTGRES_PASSWORD: curuza_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curuza"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
